services:
    app:
        build: .
        container_name: wallet_app
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        ports:
            - "8000:8000"
        command: php artisan serve --host=0.0.0.0 --port=8000
        depends_on:
            - db

    db:
        image: mysql:8.0
        container_name: wallet_db
        restart: always
        environment:
            MYSQL_DATABASE: wallet_system
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3306:3306"
        volumes:
            - dbdata:/var/lib/mysql

volumes:
    dbdata:
